<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Recetario General Dr. Vidal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#e8e0d4;min-height:100vh;}
.ah{background:#1a3a2a;padding:12px 18px;}
.ah .t{font-size:1rem;font-weight:700;color:#7ecba1;}
.ah .s{font-size:0.58rem;color:#7aaa8a;text-transform:uppercase;letter-spacing:0.08em;}
.main{padding:14px;max-width:460px;margin:0 auto;}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.ct{font-size:0.67rem;font-weight:700;color:#1a5c38;letter-spacing:0.09em;text-transform:uppercase;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid #2a7d4f;}
.fg{margin-bottom:11px;}
label{display:block;font-size:0.67rem;font-weight:700;color:#888;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px;}
input,textarea,select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-family:Arial,sans-serif;font-size:0.92rem;color:#111;-webkit-appearance:none;background:#fff;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2a7d4f;}
textarea{min-height:65px;resize:vertical;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.eb{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#f0f7f3;border:1.5px solid #2a7d4f;border-radius:8px;min-height:44px;}
.eb .n{font-size:1.1rem;font-weight:700;color:#1a5c38;}
.eb .u{font-size:0.76rem;color:#888;}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:13px;border:none;border-radius:10px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem;margin-bottom:8px;}
.btn-gen{background:#1a3a2a;color:#7ecba1;font-size:1rem;}
.btn-ia{background:#2a7d4f;color:#fff;border:none;padding:8px 14px;border-radius:7px;font-family:Arial,sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;margin-top:6px;width:100%;}
.ia-result{background:#f0f7f3;border:1.5px solid #2a7d4f;border-radius:8px;padding:10px;margin-top:8px;font-size:0.85rem;display:none;}
.ia-result.show{display:block;}
.spinner{color:#2a7d4f;font-size:0.8rem;margin-top:6px;display:none;}
.spinner.show{display:block;}
.sel-lista{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.sel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid #ddd;border-radius:7px;cursor:pointer;background:#fff;}
.sel-item.selected{border-color:#2a7d4f;background:#f0f7f3;}
.sel-item input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#2a7d4f;flex-shrink:0;}
.sel-item .med-name{font-size:0.85rem;font-weight:700;color:#111;}
.sel-item .med-sub{font-size:0.72rem;color:#666;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;overflow-y:auto;padding:10px;}
.ov.active{display:block;}
.papel{background:white;max-width:420px;margin:0 auto;border-radius:4px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.papel img.mb{width:100%;display:block;}
.cuerpo{padding:3% 7%;font-size:1.8vw;color:#111;line-height:1.5;}
@media(min-width:440px){.cuerpo{font-size:8px;}}
.rfecha{text-align:center;margin-bottom:2.5%;}
.rnombre{font-weight:700;color:#1a5278;margin-bottom:0.5%;}
.redad{margin-bottom:2%;}
.rmed-nombre{font-weight:700;color:#1a5278;margin-bottom:0.8%;}
.rmed-ind{margin-bottom:0.5%;white-space:pre-wrap;}
.rmed-bloque{margin-bottom:2%;}
.firma-area{text-align:right;padding:1% 7% 1.5%;}
.firma-area img{width:28%;}
.ob{max-width:420px;margin:10px auto 0;display:flex;flex-direction:column;gap:8px;}
.bc{background:#1a3a2a;color:#7ecba1;border:none;padding:14px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;text-align:center;}
.bc2{background:#128C7E;color:#fff;border:none;padding:14px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;text-align:center;}
.bv{background:none;color:#fff;border:1.5px solid rgba(255,255,255,0.4);padding:11px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;text-align:center;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a3a2a;color:#7ecba1;padding:9px 20px;border-radius:20px;font-family:Arial,sans-serif;font-size:0.82rem;font-weight:700;z-index:999;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header class="ah">
  <div class="t">Dr. Pablo Vidal</div>
  <div class="s">Recetario General</div>
</header>
<main class="main">
  <div class="card">
    <div class="ct">Paciente</div>
    <div class="fg"><label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="NOMBRE DEL PACIENTE" autocapitalize="characters" autocomplete="off"/>
    </div>
    <div class="fr">
      <div class="fg"><label>Fecha de nacimiento</label><input type="date" id="fn"/></div>
      <div class="fg"><label>Edad</label>
        <div class="eb"><span class="n" id="edn">-</span><span class="u">anos</span></div>
      </div>
    </div>
    <div class="fg"><label>Fecha de la receta</label><input type="date" id="fecha"/></div>
  </div>
  <div class="card">
    <div class="ct">Antiácidos y Protectores Gástricos</div>
    <div class="sel-lista" id="lista-antiacidos"></div>
  </div>
  <div class="card">
    <div class="ct">Procinéticos</div>
    <div class="sel-lista" id="lista-procineticos"></div>
  </div>
  <div class="card">
    <div class="ct">Antibióticos</div>
    <div class="sel-lista" id="lista-antibioticos"></div>
  </div>
  <div class="card">
    <div class="ct">Analgésicos / Antiinflamatorios / Relajantes</div>
    <div class="sel-lista" id="lista-analgesicos"></div>
  </div>
  <div class="card">
    <div class="ct">Otros (IA)</div>
    <div class="fg">
      <label>Dicta el medicamento libremente</label>
      <textarea id="ia-input" placeholder="Ej: omeprazol 20mg una capsula en ayunas por 30 dias..."></textarea>
      <button class="btn-ia" onclick="formatearIA()">Formatear con IA</button>
      <div class="spinner" id="ia-spinner">Formateando...</div>
      <div class="ia-result" id="ia-result"></div>
    </div>
  </div>
  <button class="btn btn-gen" onclick="generar()">Generar Receta</button>
</main>
<div class="ov" id="ov">
  <div class="papel">
    <img class="mb" src="https://raw.githubusercontent.com/drpvidal/drpvidal.github.io/main/assets/header.jpg"/>
    <div class="cuerpo">
      <div class="rfecha" id="rf"></div>
      <div class="rnombre" id="rn"></div>
      <div class="redad" id="re"></div>
      <div id="rm"></div>
    </div>
    <div class="firma-area">
      <img src="https://raw.githubusercontent.com/drpvidal/drpvidal.github.io/main/assets/firma.png"/>
    </div>
    <img style="width:100%;display:block;" src="https://raw.githubusercontent.com/drpvidal/drpvidal.github.io/main/assets/footer.jpg"/>
  </div>
  <div class="ob">
    <button class="bc" onclick="generarPDF(false)">Descargar PDF</button>
    <button class="bc2" onclick="generarPDF(true)">Compartir PDF</button>
    <button class="bv" onclick="cerrar()">Editar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var GRUPOS={antiacidos:[{n:'ULSEN PCS (OMEPRAZOL) 40 MG CAPSULAS',i:'Tomar 1 capsula por via oral cada 24 horas, 30 minutos antes del desayuno, durante 14 dias.',c:'Favor de surtir una caja con 14 capsulas.'},{n:'DURATER (FAMOTIDINA) 40 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 24 horas por la noche, durante 14 dias.',c:'Favor de surtir una caja con 14 tabletas.'},{n:'PANTOPRAZOL 40 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 24 horas, 30 minutos antes del desayuno, durante 14 dias.',c:'Favor de surtir una caja con 14 tabletas.'},{n:'NEXIUM (ESOMEPRAZOL) 40 MG CAPSULAS',i:'Tomar 1 capsula por via oral cada 24 horas, 30 minutos antes del desayuno, durante 14 dias.',c:'Favor de surtir una caja con 14 capsulas.'},{n:'DEXIVANT (DEXLANSOPRAZOL) 60 MG CAPSULAS',i:'Tomar 1 capsula por via oral cada 24 horas durante 14 dias.',c:'Favor de surtir una caja con 14 capsulas.'},{n:'KI-CAB (TEGOPRAZAN) 50 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 24 horas durante 14 dias.',c:'Favor de surtir una caja con 14 tabletas.'},{n:'ABCITO (FEXUPRAZAN) 40 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 24 horas durante 14 dias.',c:'Favor de surtir una caja con 14 tabletas.'},{n:'UNIVAL (SUCRALFATO) 1 G TABLETAS',i:'Tomar 1 tableta por via oral, disuelta en agua, una hora antes de cada alimento y 1 tableta antes de acostarse.',c:'Favor de surtir una caja.'}],procineticos:[{n:'DAGLA (CINITAPRIDA) 1 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas, 15 a 30 minutos antes de cada alimento, durante 14 dias.',c:'Favor de surtir una caja con 42 tabletas.'},{n:'MOTILIUM (DOMPERIDONA) 10 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas, 15 a 30 minutos antes de cada alimento, durante 14 dias.',c:'Favor de surtir una caja con 42 tabletas.'},{n:'METOCLOPRAMIDA 10 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas, 30 minutos antes de cada alimento, durante 14 dias.',c:'Favor de surtir una caja con 42 tabletas.'}],antibioticos:[{n:'BIOMICS (CEFIXIMA) 400 MG CAPSULAS',i:'Tomar 1 capsula por via oral cada 24 horas durante 6 dias.',c:'Favor de surtir una caja con 6 capsulas.'},{n:'ELQUINE (LEVOFLOXACINO) 500 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 24 horas durante 7 dias.',c:'Favor de surtir una caja con 7 tabletas.'},{n:'BACTRIM F (SULFAMETOXAZOL 800 MG / TRIMETOPRIM 160 MG) TABLETAS',i:'Tomar 1 tableta por via oral cada 12 horas durante 7 dias.',c:'Favor de surtir una caja con 14 tabletas.'},{n:'MACROCIT (AZITROMICINA) 500 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 24 horas durante 3 dias.',c:'Favor de surtir una caja con 3 tabletas.'},{n:'AUGMENTIN (AMOXICILINA / ACIDO CLAVULANICO) 875 MG / 125 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 12 horas durante 7 dias.',c:'Favor de surtir una caja con 14 tabletas.'},{n:'FLAGYL (METRONIDAZOL) 500 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas durante 7 dias.',c:'Favor de surtir una caja con 21 tabletas.'},{n:'CIPROFLOX (CIPROFLOXACINO) 500 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 12 horas durante 7 dias.',c:'Favor de surtir una caja con 14 tabletas.'},{n:'INVANZ (ERTAPENEM) 1 G FRASCO AMPULA',i:'Aplicar 1 g por via intramuscular profunda cada 24 horas durante 3 a 7 dias. Diluir con 3.2 mL de lidocaina simple al 1% sin epinefrina.',c:'Favor de surtir una caja con 1 frasco ampula y una ampolleta de lidocaina simple al 1% sin epinefrina.'}],analgesicos:[{n:'TYLEX 750 (PARACETAMOL) 750 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas en caso de dolor.',c:'Favor de surtir una caja.'},{n:'PARACETAMOL 1 G TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas en caso de dolor o fiebre.',c:'Favor de surtir una caja.'},{n:'DOLAC (KETOROLACO) 10 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas en caso de dolor, posterior a los alimentos.',c:'Favor de surtir una caja.'},{n:'SUPRADOL SL (KETOROLACO) 30 MG TABLETAS SUBLINGUALES',i:'Colocar 1 tableta debajo de la lengua cada 8 horas en caso de dolor intenso.',c:'Favor de surtir una caja.'},{n:'IBUPROFENO 400 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas, posterior a los alimentos, en caso de dolor o inflamacion.',c:'Favor de surtir una caja.'},{n:'IBUPROFENO 600 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas, posterior a los alimentos, en caso de dolor o inflamacion.',c:'Favor de surtir una caja.'},{n:'PROFENID (KETOPROFENO) 100 MG CAPSULAS',i:'Tomar 1 capsula por via oral cada 12 horas, posterior a los alimentos, en caso de dolor o inflamacion.',c:'Favor de surtir una caja.'},{n:'EXCEL (CELECOXIB) 200 MG CAPSULAS',i:'Tomar 1 capsula por via oral cada 12 horas en caso de dolor o inflamacion.',c:'Favor de surtir una caja.'},{n:'ARCOXIA (ETORICOXIB) 120 MG TABLETAS',i:'Tomar 1 tableta por via oral cada 24 horas en caso de dolor o inflamacion.',c:'Favor de surtir una caja.'},{n:'NORFLEX PLUS (ORFENADRINA 35 MG / PARACETAMOL 450 MG / CAFEINA 50 MG) TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas en caso de dolor muscular o contractura.',c:'Favor de surtir una caja.'},{n:'DORIXINA RELAX (CLONIXINATO DE LISINA 125 MG / CICLOBENZAPRINA 5 MG) TABLETAS',i:'Tomar 1 tableta por via oral cada 8 horas en caso de dolor muscular o contractura.',c:'Favor de surtir una caja.'},{n:'TRADOL (TRAMADOL) 50 MG CAPSULAS',i:'Tomar 1 capsula por via oral cada 8 horas en caso de dolor moderado a intenso.',c:'Favor de surtir una caja.'},{n:'TRAMACET (TRAMADOL 37.5 MG / PARACETAMOL 325 MG) TABLETAS',i:'Tomar 1 a 2 tabletas por via oral cada 8 horas en caso de dolor moderado a intenso.',c:'Favor de surtir una caja.'}]};

function renderGrupo(idLista,grupo){
  var cont=document.getElementById(idLista);
  GRUPOS[grupo].forEach(function(med,idx){
    var div=document.createElement('div');
    div.className='sel-item';
    div.innerHTML='<input type="checkbox" id="chk-'+grupo+'-'+idx+'">'
      +'<div><div class="med-name">'+med.n+'</div>'
      +'<div class="med-sub">'+med.i.substring(0,55)+'...</div></div>';
    div.querySelector('input').addEventListener('change',function(){
      div.classList.toggle('selected',this.checked);
    });
    cont.appendChild(div);
  });
}
renderGrupo('lista-antiacidos','antiacidos');
renderGrupo('lista-procineticos','procineticos');
renderGrupo('lista-antibioticos','antibioticos');
renderGrupo('lista-analgesicos','analgesicos');

function hoy(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
document.getElementById('fecha').value=hoy();
document.getElementById('fn').addEventListener('change',function(){
  var fn=this.value;if(!fn){document.getElementById('edn').textContent='-';return;}
  var p=fn.split('-'),h=new Date(),nac=new Date(+p[0],+p[1]-1,+p[2]);
  var a=h.getFullYear()-nac.getFullYear(),m=h.getMonth()-nac.getMonth();
  if(m<0||(m===0&&h.getDate()<nac.getDate()))a--;
  document.getElementById('edn').textContent=a;
});
function fL(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' de '+MES[parseInt(p[1])-1]+' de '+p[0];}
function fC(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0];}

async function formatearIA(){
  var txt=document.getElementById('ia-input').value.trim();
  if(!txt){toast('Escribe el medicamento');return;}
  document.getElementById('ia-spinner').classList.add('show');
  document.getElementById('ia-result').classList.remove('show');
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:'Eres asistente de un medico. Devuelve SOLO JSON sin markdown: {"nombre":"NOMBRE MAYUSCULAS presentacion","indicaciones":"indicacion completa.","cantidad":"Favor de surtir..."} Medicamento: '+txt}]})});
    var data=await res.json();
    var parsed=JSON.parse(data.content[0].text.trim().replace(/```json|```/g,'').trim());
    var el=document.getElementById('ia-result');
    el.innerHTML='<b style="color:#1a5278">'+parsed.nombre+'</b><br>'+parsed.indicaciones+'<br>('+parsed.cantidad+')';
    el.dataset.json=JSON.stringify(parsed);
    el.classList.add('show');
  }catch(e){toast('Error al formatear');}
  document.getElementById('ia-spinner').classList.remove('show');
}

var _r={};
function recolectarMeds(){
  var meds=[];
  ['antiacidos','procineticos','antibioticos','analgesicos'].forEach(function(grupo){
    GRUPOS[grupo].forEach(function(med,idx){
      var chk=document.getElementById('chk-'+grupo+'-'+idx);
      if(chk&&chk.checked)meds.push(med);
    });
  });
  var iaEl=document.getElementById('ia-result');
  if(iaEl.dataset.json){try{var ia=JSON.parse(iaEl.dataset.json);meds.push({n:ia.nombre,i:ia.indicaciones,c:ia.cantidad});}catch(e){}}
  return meds;
}

function generar(){
  var nombre=document.getElementById('nombre').value.trim().toUpperCase();
  var fn=document.getElementById('fn').value;
  var fecha=document.getElementById('fecha').value;
  var edad=document.getElementById('edn').textContent;
  if(!nombre){toast('Ingresa el nombre');return;}
  if(!fn){toast('Ingresa fecha de nacimiento');return;}
  var meds=recolectarMeds();
  if(!meds.length){toast('Selecciona al menos un medicamento');return;}
  document.getElementById('rf').textContent='CDMX a '+fL(fecha);
  document.getElementById('rn').textContent='Nombre: '+nombre;
  document.getElementById('re').textContent='Edad: '+edad+' anos          FN: '+fC(fn);
  var html='';
  meds.forEach(function(med,i){
    html+='<div class="rmed-bloque"><div class="rmed-nombre">'+(i+1)+'.- '+med.n+'</div>'
      +'<div class="rmed-ind">'+med.i+'</div>'
      +'<div>('+med.c.replace(/^\(|\)$/g,'')+')</div></div>';
  });
  document.getElementById('rm').innerHTML=html;
  _r={nombre:nombre,fn:fn,fecha:fecha,edad:edad,meds:meds};
  document.getElementById('ov').classList.add('active');
  document.getElementById('ov').scrollTop=0;
}
function cerrar(){document.getElementById('ov').classList.remove('active');}
function generarPDF(compartir){
  if(!_r.nombre){toast('Genera la receta primero');return;}
  toast('Generando PDF...');
  fetch('/api/generar-pdf2',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:_r.nombre,edad:_r.edad,fn:_r.fn,fecha:document.getElementById('rf').textContent.replace('CDMX a ',''),meds:_r.meds})})
  .then(function(res){if(!res.ok)throw new Error('Error '+res.status);return res.blob();})
  .then(function(blob){
    var nombre='Receta_'+_r.nombre.replace(/ /g,'_')+'.pdf';
    var file=new File([blob],nombre,{type:'application/pdf'});
    if(compartir&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:nombre});}
    else{var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=nombre;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('PDF descargado');}
  })
  .catch(function(e){toast('Error: '+e.message);});
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
</script>
</body>
</html>
