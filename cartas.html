<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cartas Médicas Dr. Vidal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#e8e0d4;min-height:100vh;}
.ah{background:#1a3a2a;padding:12px 18px;}
.ah .t{font-size:1rem;font-weight:700;color:#7ecba1;}
.ah .s{font-size:0.58rem;color:#7aaa8a;text-transform:uppercase;letter-spacing:0.08em;}
.main{padding:14px;max-width:460px;margin:0 auto;}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.ct{font-size:0.67rem;font-weight:700;color:#1a5c38;letter-spacing:0.09em;text-transform:uppercase;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid #2a7d4f;}
.fg{margin-bottom:11px;}
label{display:block;font-size:0.67rem;font-weight:700;color:#888;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px;}
input,textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-family:Arial,sans-serif;font-size:0.92rem;color:#111;-webkit-appearance:none;background:#fff;}
input:focus,textarea:focus{outline:none;border-color:#2a7d4f;}
textarea{min-height:100px;resize:vertical;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.eb{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#f0f7f3;border:1.5px solid #2a7d4f;border-radius:8px;min-height:44px;}
.eb .n{font-size:1.1rem;font-weight:700;color:#1a5c38;}
.eb .u{font-size:0.76rem;color:#888;}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.cat-btn{padding:10px 8px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-family:Arial,sans-serif;font-size:0.78rem;font-weight:700;color:#555;cursor:pointer;text-align:center;}
.cat-btn.selected{border-color:#2a7d4f;background:#f0f7f3;color:#1a5c38;}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:13px;border:none;border-radius:10px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem;margin-bottom:8px;}
.btn-gen{background:#1a3a2a;color:#7ecba1;}
.btn-ia{background:#2a7d4f;color:#fff;border:none;padding:10px 14px;border-radius:7px;font-family:Arial,sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;margin-top:6px;width:100%;}
.ia-result{background:#f0f7f3;border:1.5px solid #2a7d4f;border-radius:8px;padding:12px;margin-top:8px;font-size:0.85rem;line-height:1.6;display:none;white-space:pre-wrap;}
.ia-result.show{display:block;}
.spinner{color:#2a7d4f;font-size:0.82rem;margin-top:6px;display:none;text-align:center;}
.spinner.show{display:block;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;overflow-y:auto;padding:10px;}
.ov.active{display:block;}
.papel{background:white;max-width:420px;margin:0 auto;border-radius:4px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.papel img.mb{width:100%;display:block;}
.cuerpo{padding:4% 8%;font-size:1.8vw;color:#111;line-height:1.7;}
@media(min-width:440px){.cuerpo{font-size:8px;}}
.rfecha{text-align:right;margin-bottom:3%;}
.rtitulo{font-weight:700;color:#1a5278;font-size:2vw;margin-bottom:3%;text-align:center;}
@media(min-width:440px){.rtitulo{font-size:9px;}}
.rcuerpo{white-space:pre-wrap;margin-bottom:3%;}
.firma-area{text-align:right;padding:1% 7% 1.5%;}
.firma-area img{width:28%;}
.ob{max-width:420px;margin:10px auto 0;display:flex;flex-direction:column;gap:8px;}
.bc{background:#1a3a2a;color:#7ecba1;border:none;padding:14px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;text-align:center;}
.bc2{background:#128C7E;color:#fff;border:none;padding:14px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;text-align:center;}
.bv{background:none;color:#fff;border:1.5px solid rgba(255,255,255,0.4);padding:11px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;text-align:center;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a3a2a;color:#7ecba1;padding:9px 20px;border-radius:20px;font-family:Arial,sans-serif;font-size:0.82rem;font-weight:700;z-index:999;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header class="ah">
  <div class="t">Dr. Pablo Vidal</div>
  <div class="s">Cartas y Justificantes Médicos</div>
</header>
<main class="main">
  <div class="card">
    <div class="ct">Tipo de documento</div>
    <div class="cats">
      <button class="cat-btn" data-cat="incapacidad">🏥 Incapacidad Laboral</button>
      <button class="cat-btn" data-cat="escolar">🎓 Justificante Escolar</button>
      <button class="cat-btn" data-cat="salud">✅ Carta de Salud</button>
      <button class="cat-btn" data-cat="referencia">👨‍⚕️ Referencia a Especialista</button>
      <button class="cat-btn" data-cat="viaje">✈️ Carta para Viaje</button>
      <button class="cat-btn" data-cat="libre">📄 Carta Libre</button>
    </div>
  </div>
  <div class="card">
    <div class="ct">Paciente</div>
    <div class="fg"><label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="NOMBRE DEL PACIENTE" autocapitalize="characters" autocomplete="off"/>
    </div>
    <div class="fr">
      <div class="fg"><label>Fecha de nacimiento</label><input type="date" id="fn"/></div>
      <div class="fg"><label>Edad</label>
        <div class="eb"><span class="n" id="edn">-</span><span class="u">años</span></div>
      </div>
    </div>
    <div class="fg"><label>Fecha del documento</label><input type="date" id="fecha"/><div style="font-size:0.7rem;color:#2a7d4f;margin-top:4px;cursor:pointer;" onclick="document.getElementById('fecha').value=hoy()">↺ Usar fecha de hoy</div></div>
  </div>
  <div class="card">
    <div class="ct">Contenido</div>
    <div class="fg">
      <label>Dicta o escribe libremente</label>
      <textarea id="dictado" placeholder="Ej: paciente estuvo bajo mi cuidado del 10 al 14 de mayo por apendicitis aguda, necesita reposo absoluto por 7 dias..."></textarea>
      <button class="btn-ia" onclick="formatearCarta()">✨ Generar carta con IA</button>
      <div class="spinner" id="spinner">Generando carta...</div>
      <div class="ia-result" id="ia-result"></div>
    </div>
  </div>
  <button class="btn btn-gen" onclick="previsualizarCarta()">Vista Previa</button>
</main>
<div class="ov" id="ov">
  <div class="papel">
    <img class="mb" src="https://raw.githubusercontent.com/drpvidal/drpvidal.github.io/main/assets/header.jpg"/>
    <div class="cuerpo">
      <div class="rfecha" id="rf"></div>
      <div class="rtitulo" id="rt"></div>
      <div class="rcuerpo" id="rc"></div>
    </div>
    <div class="firma-area">
      <img src="https://raw.githubusercontent.com/drpvidal/drpvidal.github.io/main/assets/firma.png"/>
    </div>
    <img style="width:100%;display:block;" src="https://raw.githubusercontent.com/drpvidal/drpvidal.github.io/main/assets/footer.jpg"/>
  </div>
  <div class="ob">
    <button class="bc" onclick="generarPDF(false)">Descargar PDF</button>
    <button class="bc2" onclick="generarPDF(true)">Compartir PDF</button>
    <button class="bv" onclick="cerrar()">Editar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var catSeleccionada='';
var _doc={};

var TITULOS={
  incapacidad:'CONSTANCIA DE INCAPACIDAD LABORAL',
  escolar:'JUSTIFICANTE MEDICO ESCOLAR',
  salud:'CARTA DE SALUD',
  referencia:'CARTA DE REFERENCIA MEDICA',
  viaje:'CARTA MEDICA PARA VIAJE',
  libre:'CARTA MEDICA'
};

var PROMPTS={
  incapacidad:'Redacta una constancia de incapacidad laboral breve y tecnica en espanol. Maximo 3 parrafos cortos. Medico: Dr. Pablo Vidal Gonzalez, Cirujano General y Gastrointestinal. Estructura: parrafo 1: A quien corresponda + nombre y datos del paciente. Parrafo 2: diagnostico y periodo de incapacidad. Parrafo 3: una sola recomendacion de reposo y fecha de reincorporacion. MUY IMPORTANTE: NO uses asteriscos, no uses markdown, no uses simbolos especiales. Para titulos de seccion escribe el texto en MAYUSCULAS directamente. Devuelve solo texto plano sin formato especial.',
  escolar:'Redacta un justificante medico escolar breve en espanol. Maximo 3 parrafos. Medico: Dr. Pablo Vidal Gonzalez, Cirujano General y Gastrointestinal. Incluye: a quien corresponda, datos del paciente, motivo de ausencia y fechas. MUY IMPORTANTE: NO uses asteriscos, no uses markdown, no uses simbolos de formato. Solo texto plano. Devuelve solo el cuerpo del texto.',
  salud:'Redacta una carta de salud o aptitud fisica breve en espanol. Maximo 3 parrafos. Medico: Dr. Pablo Vidal Gonzalez, Cirujano General y Gastrointestinal. Incluye: a quien corresponda, datos del paciente y certificacion de salud. MUY IMPORTANTE: NO uses asteriscos ni markdown. Solo texto plano. Devuelve solo el cuerpo del texto.',
  referencia:'Redacta una carta de referencia medica concisa en espanol. Medico: Dr. Pablo Vidal Gonzalez, Cirujano General y Gastrointestinal. Incluye: estimado colega, datos del paciente, motivo de referencia y solicitud de valoracion. MUY IMPORTANTE: NO uses asteriscos ni markdown. Solo texto plano. Devuelve solo el cuerpo del texto.',
  viaje:'Redacta una carta medica para viaje concisa en espanol. Medico: Dr. Pablo Vidal Gonzalez, Cirujano General y Gastrointestinal. Certifica condicion del paciente para viaje, medicamentos si aplica y recomendaciones. MUY IMPORTANTE: NO uses asteriscos ni markdown. Solo texto plano. Devuelve solo el cuerpo del texto.',
  libre:'Redacta una carta medica formal en espanol. Medico: Dr. Pablo Vidal Gonzalez, Cirujano General y Gastrointestinal. MUY IMPORTANTE: NO uses asteriscos ni markdown. Solo texto plano. Devuelve solo el cuerpo del texto.'
};

document.querySelectorAll('.cat-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
    catSeleccionada=btn.dataset.cat;
  });
});

function hoy(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
document.getElementById('fecha').value=hoy();
document.getElementById('fn').addEventListener('change',function(){
  var fn=this.value;if(!fn){document.getElementById('edn').textContent='-';return;}
  var p=fn.split('-'),h=new Date(),nac=new Date(+p[0],+p[1]-1,+p[2]);
  var a=h.getFullYear()-nac.getFullYear(),m=h.getMonth()-nac.getMonth();
  if(m<0||(m===0&&h.getDate()<nac.getDate()))a--;
  document.getElementById('edn').textContent=a;
});
function fL(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' de '+MES[parseInt(p[1])-1]+' de '+p[0];}
function fC(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0];}

async function formatearCarta(){
  var dictado=document.getElementById('dictado').value.trim();
  var nombre=document.getElementById('nombre').value.trim();
  var fn=document.getElementById('fn').value;
  var edad=document.getElementById('edn').textContent;
  if(!catSeleccionada){toast('Selecciona el tipo de documento');return;}
  if(!nombre){toast('Ingresa el nombre del paciente');return;}
  if(!dictado){toast('Escribe o dicta el contenido');return;}
  document.getElementById('spinner').classList.add('show');
  document.getElementById('ia-result').classList.remove('show');
  var prompt=PROMPTS[catSeleccionada]+'\n\nDatos: '+nombre+', '+edad+' anos, FN: '+fC(fn)+'\n\nDictado del medico: '+dictado;
  try{
    var res=await fetch('/api/formatear-carta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})});
    var data=await res.json();
    document.getElementById('ia-result').textContent=data.texto;
    document.getElementById('ia-result').classList.add('show');
  }catch(e){toast('Error al generar la carta');}
  document.getElementById('spinner').classList.remove('show');
}

function previsualizarCarta(){
  var nombre=document.getElementById('nombre').value.trim().toUpperCase();
  var fn=document.getElementById('fn').value;
  var fecha=document.getElementById('fecha').value;
  var edad=document.getElementById('edn').textContent;
  var texto=document.getElementById('ia-result').textContent.trim();
  if(!catSeleccionada){toast('Selecciona el tipo de documento');return;}
  if(!nombre){toast('Ingresa el nombre del paciente');return;}
  if(!texto){toast('Genera la carta con IA primero');return;}
  document.getElementById('rf').textContent='CDMX a '+fL(fecha);
  document.getElementById('rt').textContent=TITULOS[catSeleccionada];
  document.getElementById('rc').textContent=texto;
  _doc={nombre:nombre,fn:fn,fecha:fL(fecha),edad:edad,titulo:TITULOS[catSeleccionada],texto:texto};
  document.getElementById('ov').classList.add('active');
  document.getElementById('ov').scrollTop=0;
}

function cerrar(){document.getElementById('ov').classList.remove('active');}

function generarPDF(compartir){
  if(!_doc.nombre){toast('Genera la carta primero');return;}
  toast('Generando PDF...');
  fetch('/api/generar-carta-pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(_doc)})
  .then(function(res){if(!res.ok)throw new Error('Error '+res.status);return res.blob();})
  .then(function(blob){
    var nombre='Carta_'+_doc.nombre.replace(/ /g,'_')+'.pdf';
    var file=new File([blob],nombre,{type:'application/pdf'});
    if(compartir&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:nombre});}
    else{var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=nombre;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('PDF descargado');}
  })
  .catch(function(e){toast('Error: '+e.message);});
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
</script>
</body>
</html>
