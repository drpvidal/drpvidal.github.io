<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Recetario Dr. Vidal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#e8e0d4;min-height:100vh;}
.ah{background:#1a3a2a;padding:12px 18px;}
.ah .t{font-size:1rem;font-weight:700;color:#7ecba1;}
.ah .s{font-size:0.58rem;color:#7aaa8a;text-transform:uppercase;letter-spacing:0.08em;}
.main{padding:14px;max-width:460px;margin:0 auto;}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.ct{font-size:0.67rem;font-weight:700;color:#1a5c38;letter-spacing:0.09em;text-transform:uppercase;margin-bottom:12px;padding-bottom:7px;border-bottom:2px solid #2a7d4f;}
.fg{margin-bottom:11px;}
label{display:block;font-size:0.67rem;font-weight:700;color:#888;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px;}
input,textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-family:Arial,sans-serif;font-size:0.92rem;color:#111;-webkit-appearance:none;}
input:focus,textarea:focus{outline:none;border-color:#2a7d4f;}
textarea{min-height:65px;resize:vertical;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.eb{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#f0f7f3;border:1.5px solid #2a7d4f;border-radius:8px;min-height:44px;}
.eb .n{font-size:1.1rem;font-weight:700;color:#1a5c38;}
.eb .u{font-size:0.76rem;color:#888;}
.btn{display:flex;align-items:center;justify-content:center;width:100%;padding:13px;border:none;border-radius:10px;font-family:Arial,sans-serif;font-weight:700;cursor:pointer;font-size:0.95rem;margin-bottom:8px;}
.btn-gen{background:#1a3a2a;color:#7ecba1;font-size:1rem;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;overflow-y:auto;padding:10px;}
.ov.active{display:block;}
.papel{background:white;max-width:420px;margin:0 auto;border-radius:4px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
.papel img.mb{width:100%;display:block;}
.cuerpo{padding:3% 7%;font-size:1.8vw;color:#111;line-height:1.5;}
@media(min-width:440px){.cuerpo{font-size:8px;}}
.rfecha{text-align:center;margin-bottom:2.5%;}
.rnombre{font-weight:700;color:#1a5278;margin-bottom:0.5%;}
.redad{margin-bottom:2%;}
.rmed-nombre{font-weight:700;color:#1a5278;margin-bottom:0.8%;}
.rmed-ind{margin-bottom:0.5%;white-space:pre-wrap;}
.rmed-bloque{margin-bottom:2%;}
.firma-area{text-align:right;padding:1% 7% 1.5%;}
.firma-area img{width:28%;}
.ob{max-width:420px;margin:10px auto 0;display:flex;flex-direction:column;gap:8px;}
.bc{background:#25D366;color:#fff;border:none;padding:14px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;text-align:center;}
.bv{background:none;color:#fff;border:1.5px solid rgba(255,255,255,0.4);padding:11px;border-radius:10px;font-family:Arial,sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;text-align:center;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a3a2a;color:#7ecba1;padding:9px 20px;border-radius:20px;font-family:Arial,sans-serif;font-size:0.82rem;font-weight:700;z-index:999;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header class="ah">
  <div class="t">Dr. Pablo Vidal</div>
  <div class="s">Recetario Digital</div>
</header>
<main class="main">
  <div class="card">
    <div class="ct">Paciente</div>
    <div class="fg"><label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="MARIA LOPEZ PEREZ" autocapitalize="characters" autocomplete="off"/>
    </div>
    <div class="fr">
      <div class="fg"><label>Fecha de nacimiento</label><input type="date" id="fn"/></div>
      <div class="fg"><label>Edad</label>
        <div class="eb"><span class="n" id="edn">-</span><span class="u">anos</span></div>
      </div>
    </div>
    <div class="fg"><label>Fecha de la receta</label><input type="date" id="fecha"/></div>
  </div>
  <div class="card">
    <div class="ct">Medicamento</div>
    <div class="fg"><label>Nombre y presentacion</label>
      <input type="text" id="mn" placeholder="Ej. AMOXICILINA 875mg tabletas" autocomplete="off"/>
    </div>
    <div class="fg"><label>Indicaciones</label>
      <textarea id="mi" placeholder="Ej. Tomar 1 tableta cada 12 horas por 7 dias via oral."></textarea>
    </div>
    <div class="fg"><label>Cantidad a surtir</label>
      <input type="text" id="mc" placeholder="Ej. Favor de surtir una caja con 14 tabletas."/>
    </div>
  </div>
  <button class="btn btn-gen" onclick="generar()">Generar Receta</button>
</main>

<div class="toast" id="toast"></div>
<script>var MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function hoy(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
document.getElementById('fecha').value=hoy();
document.getElementById('fn').addEventListener('change',function(){
  var fn=this.value;
  if(!fn){document.getElementById('edn').textContent='-';return;}
  var p=fn.split('-');
  var hoyD=new Date();
  var nac=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  var a=hoyD.getFullYear()-nac.getFullYear();
  var m=hoyD.getMonth()-nac.getMonth();
  if(m<0||(m===0&&hoyD.getDate()<nac.getDate()))a--;
  document.getElementById('edn').textContent=a;
});
function fL(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+' de '+MES[parseInt(p[1])-1]+' de '+p[0];}
function fC(s){if(!s)return'';var p=s.split('-');return parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0];}
var _r={};
function generar(){
  var nombre=document.getElementById('nombre').value.trim().toUpperCase();
  var fn=document.getElementById('fn').value;
  var fecha=document.getElementById('fecha').value;
  var edad=document.getElementById('edn').textContent;
  var mn=document.getElementById('mn').value.trim().toUpperCase();
  var mi=document.getElementById('mi').value.trim();
  var mc=document.getElementById('mc').value.trim();
  if(!nombre){toast('Ingresa el nombre');return;}
  if(!fn){toast('Ingresa fecha de nacimiento');return;}
  if(!mn){toast('Ingresa el medicamento');return;}
  document.getElementById('rf').textContent='CDMX a '+fL(fecha);
  document.getElementById('rn').textContent='Nombre: '+nombre;
  document.getElementById('re').textContent='Edad: '+edad+' anos          FN: '+fC(fn);
  var h='<div class="rmed-bloque"><div class="rmed-nombre">1.- '+mn+'</div>';
  if(mi)h+='<div class="rmed-ind">'+mi+'</div>';
  if(mc)h+='<div class="rmed-cant">('+mc.replace(/^[(]|[)]$/g,'')+')</div>';
  h+='</div>';
  document.getElementById('rm').innerHTML=h;
  _r={nombre:nombre,fn:fn,fecha:fecha,edad:edad,mn:mn,mi:mi,mc:mc};
  document.getElementById('ov').classList.add('active');
  document.getElementById('ov').scrollTop=0;
}
function cerrar(){document.getElementById('ov').classList.remove('active');}
function compartir(){
  var nl=String.fromCharCode(10);
  var txt='RECETA MEDICA'+nl+'Dr. Pablo Vidal Gonzalez'+nl+'CDMX a '+fL(_r.fecha)+nl+nl;
  txt+='Nombre: '+_r.nombre+nl+'Edad: '+_r.edad+' anos   FN: '+fC(_r.fn)+nl+nl;
  txt+='1.- '+_r.mn+nl;
  if(_r.mi)txt+=_r.mi+nl;
  if(_r.mc)txt+='('+_r.mc.replace(/^[(]|[)]$/g,'')+')'+ nl;
  if(navigator.share)navigator.share({title:'Receta - '+_r.nombre,text:txt});
  else navigator.clipboard.writeText(txt).then(function(){toast('Copiado');});
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}

function generarPDF() {
  toast('Generando PDF...');
  var nombre = (_r.nombre || 'Receta').replace(/ /g,'_');
  var pdf = new jspdf.jsPDF({orientation:'portrait', unit:'pt', format:[595, 495]});
  var hdrEl = document.querySelector('img.mb');
  var ftrEl = document.querySelector('.papel img:last-child');
  var frmEl = document.querySelector('.firma-area img');
  pdf.addImage(hdrEl, 'JPEG', 0, 0, 595, 115);
  pdf.setFont('helvetica','normal');
  pdf.setFontSize(10);
  pdf.setTextColor(0,0,0);
  pdf.text(document.getElementById('rf').textContent, 297, 140, {align:'center'});
  pdf.setFont('helvetica','bold');
  pdf.setTextColor(26,82,120);
  pdf.text(document.getElementById('rn').textContent, 44, 160);
  pdf.setFont('helvetica','normal');
  pdf.setTextColor(0,0,0);
  pdf.text(document.getElementById('re').textContent, 44, 175);
  var y = 195;
  document.querySelectorAll('.rmed-bloque').forEach(function(med) {
    var nom=med.querySelector('.rmed-nombre');
    var ind=med.querySelector('.rmed-ind');
    var cant=med.querySelector('.rmed-cant');
    if(nom){pdf.setFont('helvetica','bold');pdf.setTextColor(26,82,120);pdf.text(nom.textContent,44,y);y+=14;}
    if(ind){pdf.setFont('helvetica','normal');pdf.setTextColor(0,0,0);var lines=pdf.splitTextToSize(ind.textContent,500);pdf.text(lines,44,y);y+=lines.length*13;}
    if(cant){pdf.setFont('helvetica','normal');pdf.setTextColor(0,0,0);pdf.text(cant.textContent,44,y);y+=14;}
    y+=6;
  });
  pdf.addImage(frmEl, 'PNG', 300, 370, 180, 66);
  pdf.addImage(ftrEl, 'JPEG', 0, 418, 595, 77);
  pdf.save('Receta_'+nombre+'.pdf');
  toast('PDF descargado');
}
</script>
